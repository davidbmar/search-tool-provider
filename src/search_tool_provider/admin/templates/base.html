<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}search-tool-provider{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>search-tool-provider</h1>
        <nav>
            <a href="/setup" class="{% if active == 'setup' %}active{% endif %}">Setup</a>

    </header>
    {% block content %}{% endblock %}

</body>
</html>
