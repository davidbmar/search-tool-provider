{% extends "base.html" %}
{% block title %}Config — search-tool-provider{% endblock %}
{% block content %}
<div class="container">
    <h2 class="mt-2 mb-2">Current Configuration</h2>

    <div class="card" id="status-card">
        <div class="text-dim">Loading...</div>
    </div>

    <h3 class="mt-3 mb-2">Environment Variables</h3>
    <div class="card">
        <pre><code id="env-display"></code></pre>
    </div>

    <h3 class="mt-3 mb-2">MCP Server Config</h3>
    <div class="tabs">
        <div class="tab active" onclick="switchTab(this, 'tab-claude')">Claude Code</div>
        <div class="tab" onclick="switchTab(this, 'tab-cursor')">Cursor</div>
    </div>
    <div id="tab-claude" class="tab-content active card" style="border-radius: 0 var(--radius) var(--radius) var(--radius);">
        <pre><code id="config-claude"></code></pre>
    </div>
    <div id="tab-cursor" class="tab-content card" style="border-radius: 0 var(--radius) var(--radius) var(--radius);">
        <pre><code id="config-cursor"></code></pre>
    </div>

    <div class="mt-3">
        <a href="/setup" class="btn btn-primary">Re-run Setup Wizard</a>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadConfig);

async function loadConfig() {
    try {
        var resp = await fetch('/api/status');
        var data = await resp.json();

        var card = document.getElementById('status-card');
        while (card.firstChild) card.removeChild(card.firstChild);

        var provDiv = document.createElement('div');
        var strong = document.createElement('strong');
        strong.textContent = 'Provider: ';
        provDiv.appendChild(strong);
        provDiv.appendChild(document.createTextNode(data.provider));
        card.appendChild(provDiv);

        var confDiv = document.createElement('div');
        confDiv.className = 'text-dim mt-1';
        confDiv.textContent = 'Configured: ' + (data.configured ? 'Yes' : 'No');
        card.appendChild(confDiv);

        var featDiv = document.createElement('div');
        featDiv.className = 'text-dim';
        featDiv.textContent = 'Features: ' + (data.features || []).join(', ');
        card.appendChild(featDiv);

        // Build config displays
        var envObj = {};
        envObj['SEARCH_PROVIDER'] = data.provider;
        if (data.env_vars) {
            Object.keys(data.env_vars).forEach(function(k) {
                envObj[k] = data.env_vars[k] ? '***' : '(not set)';
            });
        }
        var envLines = Object.keys(envObj).map(function(k) { return k + '=' + envObj[k]; });
        document.getElementById('env-display').textContent = envLines.join('\n');

        var mcp = {
            mcpServers: {
                "search-tool-provider": {
                    command: "search-provider-mcp",
                    env: {SEARCH_PROVIDER: data.provider}
                }
            }
        };
        document.getElementById('config-claude').textContent = JSON.stringify(mcp, null, 2);
        document.getElementById('config-cursor').textContent = JSON.stringify(mcp, null, 2);
    } catch (e) {
        var card = document.getElementById('status-card');
        while (card.firstChild) card.removeChild(card.firstChild);
        var err = document.createElement('div');
        err.className = 'alert alert-error';
        err.textContent = 'Failed to load config: ' + e.message;
        card.appendChild(err);
    }
}

function switchTab(el, id) {
    el.parentElement.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
}
</script>
{% endblock %}
